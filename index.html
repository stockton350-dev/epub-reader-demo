<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EPUB Reader — Cambridge</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cambridge-blue: #8EE8D8;
      --cambridge-dark: #133844;
      --cambridge-mid:  #00BDB6;
      --bg:             #f4f6f8;
      --surface:        #ffffff;
      --border:         #cdd5dd;
      --text:           #1a2433;
      --text-muted:     #5a6a7a;
      --red:            #D6083B;
      --shadow-sm:      0 1px 4px rgba(19,56,68,0.08);
      --shadow-md:      0 4px 20px rgba(19,56,68,0.13);
      --nav-h:          60px;
      --bar-h:          36px;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Password gate ── */
    #passwordGate {
      position: fixed;
      inset: 0;
      background: var(--cambridge-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #passwordGate.hidden { display: none; }

    .gate-card {
      background: var(--surface);
      border-top: 4px solid var(--cambridge-blue);
      padding: 44px 48px 40px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .gate-shield { width: 40px; height: 46px; margin-bottom: 4px; }
    .gate-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--cambridge-dark);
      text-align: center;
    }
    .gate-sub {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      margin-top: -10px;
    }
    #passwordInput {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    #passwordInput:focus { border-color: var(--cambridge-mid); }
    #passwordInput.error { border-color: var(--red); }
    #gateError {
      font-size: 12px;
      color: var(--red);
      min-height: 16px;
      text-align: center;
      margin-top: -10px;
    }
    #gateBtn {
      width: 100%;
      padding: 11px;
      background: var(--cambridge-dark);
      color: #fff;
      border: none;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }
    #gateBtn:hover { background: #1d5068; }
    .gate-footer {
      font-size: 10.5px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 28px;
    }

    /* ── Top bar ── */
    #topbar {
      height: var(--nav-h);
      background: var(--cambridge-dark);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    #topbar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--cambridge-blue);
    }

    .cup-logo { display: flex; align-items: center; gap: 11px; flex-shrink: 0; }
    .cup-shield { width: 26px; height: 30px; flex-shrink: 0; }
    .cup-shield svg { width: 100%; height: 100%; }
    .cup-wordmark { line-height: 1.25; }
    .cup-wordmark .name {
      font-family: 'Playfair Display', serif;
      font-size: 13.5px; font-weight: 600;
      color: #ffffff; display: block;
    }
    .cup-wordmark .sub {
      font-family: 'Open Sans', sans-serif;
      font-size: 9.5px; font-weight: 300;
      color: var(--cambridge-blue);
      letter-spacing: 0.1em; text-transform: uppercase; display: block;
    }
    .topbar-sep { width: 1px; height: 26px; background: rgba(142,232,216,0.22); flex-shrink: 0; }
    #bookTitle {
      font-size: 13px; font-weight: 400;
      color: rgba(255,255,255,0.75);
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Status bar ── */
    #statusBar {
      height: var(--bar-h);
      display: flex; align-items: center;
      padding: 0 24px;
      font-size: 11.5px; color: var(--text-muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; gap: 8px;
    }
    #statusBar.ok  { color: #1a6b3a; }
    #statusBar.bad { color: var(--red); }
    #statusDot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--border); flex-shrink: 0; transition: background 0.3s;
    }
    #statusBar.ok      #statusDot { background: #2ecc71; }
    #statusBar.bad     #statusDot { background: var(--red); }
    #statusBar.loading #statusDot {
      background: var(--cambridge-mid);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* ── Reader area ── */
    #readerWrap {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; position: relative; background: var(--bg);
    }
    #viewer {
      flex: 1; overflow: hidden; background: var(--surface);
      position: relative;
      margin: 18px 76px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
    }
    #viewer iframe { border: none !important; }

    /* ── Nav arrows ── */
    .nav-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 42px; height: 76px;
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--text-muted);
      transition: all 0.15s ease; z-index: 5;
      box-shadow: var(--shadow-sm); user-select: none;
    }
    .nav-arrow:hover { background: var(--cambridge-dark); color: var(--cambridge-blue); border-color: var(--cambridge-dark); }
    .nav-arrow:active { transform: translateY(-50%) scale(0.96); }
    #prevBtn { left: 16px; }
    #nextBtn { right: 16px; }

    /* ── Bottom bar ── */
    #bottomBar {
      height: var(--bar-h); background: var(--cambridge-dark);
      display: flex; align-items: center; padding: 0 24px;
      flex-shrink: 0; font-size: 10.5px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    #progressWrap {
      flex: 1; margin: 0 20px; height: 2px;
      background: rgba(255,255,255,0.12); overflow: hidden;
    }
    #progressBar {
      height: 100%; background: var(--cambridge-blue);
      width: 0%; transition: width 0.5s ease;
    }

    /* ── Landing ── */
    #landing {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; background: var(--surface); z-index: 20;
    }
    .landing-shield { width: 52px; height: 60px; opacity: 0.18; }
    #landing p {
      font-family: 'Playfair Display', serif;
      font-size: 19px; font-weight: 600; color: var(--cambridge-dark);
    }
    #landing .hint { font-size: 11.5px; color: var(--text-muted); }
    #landing.hidden { display: none; }

    .kbd {
      display: inline-block; padding: 1px 5px;
      background: var(--bg); border: 1px solid var(--border);
      font-size: 10px; font-family: monospace; color: var(--text-muted);
    }
  </style>
</head>
<body>

  <!-- Password Gate -->
  <div id="passwordGate">
    <div class="gate-card">
      <svg class="gate-shield" viewBox="0 0 26 30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 0H26V21L13 30L0 21V0Z" fill="#133844"/>
        <path d="M5 8H21M5 13H21M5 18H14" stroke="#8EE8D8" stroke-width="1.8" stroke-linecap="round"/>
        <rect x="11" y="4" width="4" height="5" rx="0.5" fill="#8EE8D8"/>
      </svg>
      <div class="gate-title">Access Required</div>
      <div class="gate-sub">Enter your access code to continue</div>
      <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="current-password" />
      <div id="gateError"></div>
      <button id="gateBtn">Continue</button>
    </div>
    <div class="gate-footer">Cambridge University Press</div>
  </div>

  <div id="topbar">
    <div class="cup-logo">
      <div class="cup-shield">
        <svg viewBox="0 0 26 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 0H26V21L13 30L0 21V0Z" fill="#8EE8D8"/>
          <path d="M5 8H21M5 13H21M5 18H14" stroke="#133844" stroke-width="1.8" stroke-linecap="round"/>
          <rect x="11" y="4" width="4" height="5" rx="0.5" fill="#133844"/>
        </svg>
      </div>
      <div class="cup-wordmark">
        <span class="name">Cambridge</span>
        <span class="sub">University Press</span>
      </div>
    </div>
    <div class="topbar-sep"></div>
    <div id="bookTitle">Loading…</div>
  </div>

  <div id="statusBar">
    <span id="statusDot"></span>
    <span id="statusMsg">Initialising reader…</span>
  </div>

  <div id="readerWrap">
    <div id="viewer"></div>
    <button class="nav-arrow" id="prevBtn" title="Previous page">&#8249;</button>
    <button class="nav-arrow" id="nextBtn" title="Next page">&#8250;</button>

    <div id="landing">
      <svg class="landing-shield" viewBox="0 0 26 30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 0H26V21L13 30L0 21V0Z" fill="#133844"/>
        <path d="M5 8H21M5 13H21M5 18H14" stroke="#8EE8D8" stroke-width="1.8" stroke-linecap="round"/>
        <rect x="11" y="4" width="4" height="5" rx="0.5" fill="#8EE8D8"/>
      </svg>
      <p>Opening your book…</p>
      <span class="hint">Use <span class="kbd">&#8592;</span> <span class="kbd">&#8594;</span> or the arrows to navigate</span>
    </div>
  </div>

  <div id="bottomBar">
    <span id="locLabel">—</span>
    <div id="progressWrap"><div id="progressBar"></div></div>
    <span>Cambridge University Press</span>
  </div>

  <script>
    let currentBook = null;
    let currentRendition = null;

    const statusBar   = document.getElementById('statusBar');
    const statusMsg   = document.getElementById('statusMsg');
    const bookTitle   = document.getElementById('bookTitle');
    const landing     = document.getElementById('landing');
    const locLabel    = document.getElementById('locLabel');
    const progressBar = document.getElementById('progressBar');

    function setStatus(msg, kind) {
      statusMsg.textContent = msg;
      statusBar.className = kind || '';
    }

    // ── This is the exact initBook/loadEpub from the working version ──
    function initBook(source, name) {
      if (currentBook) { currentBook.destroy(); currentBook = null; }
      bookTitle.textContent = name || 'EPUB Reader';

      const book = ePub(source);
      currentBook = book;

      book.on('openFailed', err => setStatus('openFailed: ' + (err?.message || err), 'bad'));
      book.on('error',      err => setStatus('book error: '  + (err?.message || err), 'bad'));

      const rendition = book.renderTo('viewer', {
        width: '100%', height: '100%', spread: 'none', flow: 'paginated',
      });
      currentRendition = rendition;

      rendition.on('relocated', loc => {
        locLabel.textContent = 'Section ' + (loc.start.index + 1);
        progressBar.style.width = ((loc.start.percentage || 0) * 100).toFixed(1) + '%';
      });
      rendition.on('rendered', () => {
        setStatus('Reading — use arrow keys or buttons to navigate', 'ok');
        landing.classList.add('hidden');
      });

      book.ready.then(() => book.loaded.metadata)
        .then(meta => { if (meta?.title) bookTitle.textContent = meta.title; })
        .catch(() => {});
      book.ready.then(() => book.locations.generate(1024)).catch(() => {});

      rendition.display().catch(err => {
        setStatus('display() failed: ' + (err?.message || err), 'bad');
      });
    }

    function loadEpub(url, name) {
      if (currentBook) { currentBook.destroy(); currentBook = null; }
      landing.classList.add('hidden');
      setStatus('Fetching EPUB…', 'loading');

      fetch(url)
        .then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + r.statusText);
          setStatus('Parsing EPUB…', 'loading');
          return r.arrayBuffer();
        })
        .then(buffer => {
          setStatus('Rendering…', 'loading');
          initBook(buffer, name);
        })
        .catch(err => {
          setStatus('Fetch failed: ' + err.message, 'bad');
          landing.classList.remove('hidden');
        });
    }

    // ── Navigation ──
    document.getElementById('prevBtn').addEventListener('click', () => currentRendition?.prev());
    document.getElementById('nextBtn').addEventListener('click', () => currentRendition?.next());
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  currentRendition?.prev();
      if (e.key === 'ArrowRight') currentRendition?.next();
    });

    // ── Password gate ──
    const PASSWORD = 'password123';
    const gateEl    = document.getElementById('passwordGate');
    const inputEl   = document.getElementById('passwordInput');
    const errorEl   = document.getElementById('gateError');
    const gateBtnEl = document.getElementById('gateBtn');

    function tryUnlock() {
      if (inputEl.value === PASSWORD) {
        gateEl.classList.add('hidden');
        loadEpub('./sample.epub', 'Sample Book');
      } else {
        inputEl.classList.add('error');
        errorEl.textContent = 'Incorrect password. Please try again.';
        inputEl.value = '';
        inputEl.focus();
        setTimeout(() => { inputEl.classList.remove('error'); }, 1200);
      }
    }

    gateBtnEl.addEventListener('click', tryUnlock);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
  </script>
</body>
</html>
