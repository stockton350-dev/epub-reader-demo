<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>EPUB Reader Demo</title>
<script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 20px;
}

#viewer {
  height: 85vh;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<h2>EPUB Online Reader Demo</h2>

<div id="viewer"></div>

<script>
var book = ePub("./sample.epub");

var rendition = book.renderTo("viewer", {
  width: "100%",
  height: "100%"
});

rendition.display();
</script>

</body>

</html>
